document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Brains Mono',monospace;font-size:12.5px;color:#8f8c84;letter-spacing:.04em;margin-bottom:30px;white-space:nowrap;\">\n        <span data-geo=\"\" data-target=\"20.9674\" data-suffix=\"° N\">0.0000° N<\u002Fspan>&nbsp;·&nbsp;<span data-geo=\"\" data-target=\"89.6237\" data-suffix=\"° W\">0.0000° W<\u002Fspan>\n      <\u002Fdiv>\n      <h1 ref=\"{{ nameRef }}\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;line-height:.94;letter-spacing:-.035em;margin:0;font-size:clamp(48px,8.6vw,116px);text-wrap:balance;\">\n        <span data-word=\"\" data-text=\"Juan Pablo\" style=\"display:block;color:#1c1c1a;\">Juan Pablo<\u002Fspan>\n        <span data-word=\"\" data-text=\"Figueroa\" style=\"display:block;color:#aeaaa1;\">Figueroa<\u002Fspan>\n      <\u002Fh1>\n      <p data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:clamp(13px,1.5vw,15.5px);color:#57544e;letter-spacing:.01em;margin:26px 0 0;\">\n        17 · futuro Ing. en Transformación Digital\n      <\u002Fp>\n      <p data-reveal=\"\" style=\"font-size:clamp(15px,1.6vw,18px);line-height:1.64;color:#57544e;max-width:520px;margin:20px 0 0;text-wrap:pretty;\">\n        Nací y crecí en Mérida. Pasé dos años estudiando en Londres y ahora estoy de vuelta en casa terminando la prepa. Me mueve el deporte, la tecnología y la ambición de convertir ideas en productos reales.\n      <\u002Fp>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:38px;\">\n        <a href=\"#trayectoria\" style=\"display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:8px;background:#1c1c1a;color:#f6f5f3;text-decoration:none;font-weight:500;font-size:15px;\" style-hover=\"background:#3a5688;\">\n          Ver mi trayectoria\n        <\u002Fa>\n        <a href=\"#meta\" style=\"display:inline-flex;align-items:center;gap:8px;color:#57544e;text-decoration:none;font-weight:500;font-size:15px;\" style-hover=\"color:#1c1c1a;\">\n ight:600;font-size:34px;line-height:1.1;color:#1c1c1a;margin-top:5px;font-variant-numeric:tabular-nums;\">02<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px 18px;border-right:1px solid rgba(28,28,26,.07);\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#a09d95;letter-spacing:.04em;text-transform:uppercase;\">idiomas<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:34px;line-height:1.1;color:#1c1c1a;margin-top:5px;\">ES·EN<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px 18px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#a09d95;letter-spacing:.04em;text-transform:uppercase;\">siguiente<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:34px;line-height:1.1;color:#1c1c1a;margin-top:5px;\">Tec<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"trayectoria\" data-screen-label=\"Trayectoria\" data-reveal=\"\" ref=\"{{ timelineRef }}\" style=\"position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 70px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:6px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#a09d95;\">01<\u002Fspan>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(26px,4vw,42px);letter-spacing:-.02em;margin:0;color:#1c1c1a;\">Trayectoria<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#a09d95;margin:0 0 34px;\">de Mérida a Londres y de vuelta a casa · <span style=\"color:#3a5688;\">toca cada punto<\u002Fspan><\u002Fp>\n\n    <div style=\"position:relative;border:1px solid rgba(28,28,26,.10);border-radius:16px;background:#fdfdfc;overflow:hidden;\">\n      <div style=\"padding:24px 22px 6px;\">\n        <svg viewBox=\"0 0 1000 300\" preserveAspectRatio=\"none\" style=\"width:100%;height:auto;display:block;overflow:visible;\">\n          <line x1=\"0\" y1=\"75\" x2=\"1000\" y2=\"75\" stroke=\"rgba(28,28,26,.05)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"0\" y1=\"150\" x2=\"1000\" y2=\"150\" stroke=\"rgba(28,28,26,.05)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"0\" y1=\"225\" x2=\"1000\" y2=\"225\" stroke=\"rgba(28,28,26,.05)\" stroke-width=\"1\"><\u002Fline>\n          <path ref=\"{{ lineRef }}\" d=\"M55,255 L129,210 L203,225 L278,185 L352,190 L426,160 L500,200 L574,150 L648,130 L723,95 L797,80 L871,70 L945,48\" fill=\"none\" stroke=\"#3a5688\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <g ref=\"{{ nodesRef }}\">\n            <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"13\">\n              <circle cx=\"{{ ev.x }}\" cy=\"{{ ev.y }}\" r=\"18\" fill=\"transparent\" style=\"cursor:pointer;\" onclick=\"{{ ev.onClick }}\"><\u002Fcircle>\n              <circle data-node=\"\" cx=\"{{ ev.x }}\" cy=\"{{ ev.y }}\" r=\"{{ ev.nodeR }}\" fill=\"{{ ev.nodeFill }}\" stroke=\"{{ ev.nodeStroke }}\" stroke-width=\"{{ ev.nodeStrokeW }}\" style=\"pointer-events:none;transition:fill .2s ease,stroke .2s ease;\"><\u002Fcircle>\n            <\u002Fsc-for>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px;padding:8px 22px 20px;\">\n        <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"13\">\n          <button onclick=\"{{ ev.onClick }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.02em;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap;background:{{ ev.chipBg }};color:{{ ev.chipColor }};border:1px solid {{ ev.chipBorder }};transition:all .18s ease;\">{{ ev.chip }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div ref=\"{{ bubbleRef }}\" style=\"padding:24px clamp(18px,3vw,30px) 30px;border-top:1px solid rgba(28,28,26,.08);background:#faf9f7;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#3a5688;flex:none;\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#3a5688;letter-spacing:.04em;\">{{ bubbleYear }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(20px,2.7vw,28px);letter-spacing:-.01em;margin-top:11px;color:#1c1c1a;\">{{ bubbleTitle }}<\u002Fdiv>\n        <p style=\"font-size:14.5px;color:#8f8c84;line-height:1.62;margin:11px 0 0;max-width:720px;text-wrap:pretty;\">{{ bubbleDesc }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"meta\" data-screen-label=\"En un año\" data-reveal=\"\" style=\"position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 70px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:6px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#a09d95;\">02<\u002Fspan>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(26px,4vw,42px);letter-spacing:-.02em;margin:0;color:#1c1c1a;text-wrap:balance;\">En un año<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#a09d95;margin:0 0 38px;\">dónde quiero estar en doce meses · <span style=\"color:#3a5688;\">pasa el cursor<\u002Fspan><\u002Fp>\n\n    <div style=\"border-top:1px solid rgba(28,28,26,.12);\">\n      <sc-for list=\"{{ goals }}\" as=\"g\" hint-placeholder-count=\"5\">\n        <div onmouseenter=\"{{ g.onEnter }}\" onmouseleave=\"{{ g.onLeave }}\" style=\"border-bottom:1px solid rgba(28,28,26,.10);padding:24px 6px;cursor:default;transition:background .25s ease;background:{{ g.rowBg }};\">\n          <div style=\"display:flex;gap:clamp(16px,4vw,48px);align-items:baseline;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;flex:none;width:30px;font-variant-numeric:tabular-nums;color:{{ g.numColor }};transition:color .25s ease;\">{{ g.num }}<\u002Fspan>\n            <div style=\"flex:1 1 auto;font-size:clamp(18px,2.4vw,26px);font-weight:500;letter-spacing:-.01em;color:#1c1c1a;line-height:1.35;text-wrap:balance;\">{{ g.title }}<\u002Fdiv>\n            <span style=\"flex:none;align-self:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border-radius:999px;white-space:nowrap;background:{{ g.chipBg }};color:{{ g.chipColor }};border:1px solid {{ g.chipBorder }};\">{{ g.status }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-rows:{{ g.whyRows }};opacity:{{ g.whyOpacity }};transition:grid-template-rows .32s ease,opacity .32s ease;\">\n            <div style=\"overflow:hidden;\">\n              <p style=\"margin:11px 0 0 calc(30px + clamp(16px,4vw,48px));font-size:14.5px;color:#8f8c84;line-height:1.55;max-width:560px;text-wrap:pretty;\">{{ g.why }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sobre-mi\" data-screen-label=\"Sobre mí\" data-reveal=\"\" style=\"position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:60px clamp(20px,5vw,64px) 70px;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:6px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#a09d95;\">03<\u002Fspan>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(26px,4vw,42px);letter-spacing:-.02em;margin:0;color:#1c1c1a;\">Sobre mí<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#a09d95;margin:0 0 34px;\">lo que me mueve dentro y fuera de la cancha<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:16px;\">\n      <div data-card=\"\" style=\"border:1px solid rgba(28,28,26,.10);border-radius:14px;background:#fdfdfc;padding:24px;transition:transform .25s ease,border-color .25s ease;\" style-hover=\"transform:translateY(-4px);border-color:rgba(28,28,26,.22);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a09d95;\">01 / deporte<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:23px;margin-top:12px;color:#1c1c1a;\">Fútbol<\u002Fdiv>\n        <p style=\"font-size:14px;color:#8f8c84;line-height:1.55;margin:8px 0 0;\">Competitivo y de equipo. Donde aprendí disciplina, lectura de juego y a no rendirme.<\u002Fp>\n      <\u002Fdiv>\n      <div data-card=\"\" style=\"border:1px solid rgba(28,28,26,.10);border-radius:14px;background:#fdfdfc;padding:24px;transition:transform .25s ease,border-color .25s ease;\" style-hover=\"transform:translateY(-4px);border-color:rgba(28,28,26,.22);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a09d95;\">02 / deporte<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:23px;margin-top:12px;color:#1c1c1a;\">Tenis<\u002Fdiv>\n        <p style=\"font-size:14px;color:#8f8c84;line-height:1.55;margin:8px 0 0;\">Mi lado individual: enfoque, precisión y la mentalidad de mejorar punto a punto.<\u002Fp>\n      <\u002Fdiv>\n      <div data-card=\"\" style=\"border:1px solid rgba(28,28,26,.10);border-radius:14px;background:#fdfdfc;padding:24px;transition:transform .25s ease,border-color .25s ease;\" style-hover=\"transform:translateY(-4px);border-color:rgba(28,28,26,.22);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a09d95;\">03 / craft<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:23px;margin-top:12px;color:#1c1c1a;\">Desarrollo web<\u002Fdiv>\n        <p style=\"font-size:14px;color:#8f8c84;line-height:1.55;margin:8px 0 0;\">Tomando un curso de desarrollo y diseño digital para construir mis propias ideas.<\u002Fp>\n      <\u002Fdiv>\n      <div data-card=\"\" style=\"border:1px solid rgba(28,28,26,.10);border-radius:14px;background:#fdfdfc;padding:24px;transition:transform .25s ease,border-color .25s ease;\" style-hover=\"transform:translateY(-4px);border-color:rgba(28,28,26,.22);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a09d95;\">04 / visión<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:23px;margin-top:12px;color:#1c1c1a;\">Emprendimiento<\u002Fdiv>\n        <p style=\"font-size:14px;color:#8f8c84;line-height:1.55;margin:8px 0 0;\">Empezar temprano, construir cosas reales y dejar mi marca en tech.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer data-reveal=\"\" style=\"position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:40px clamp(20px,5vw,64px) 64px;border-top:1px solid rgba(28,28,26,.10);display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between;\">\n    <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px;color:#1c1c1a;\">JP<span style=\"color:#3a5688;\">.<\u002Fspan><\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#8f8c84;text-align:center;\">construyendo desde Mérida — apuntando alto.<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#a09d95;\">© 2026 Juan Pablo Figueroa<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.nameRef = React.createRef();\n    this.statsRef = React.createRef();\n    this.timelineRef = React.createRef();\n    this.lineRef = React.createRef();\n    this.nodesRef = React.createRef();\n    this.geoRef = React.createRef();\n    this.geoStatusRef = React.createRef();\n    this.bubbleRef = React.createRef();\n    this.state = { active: 0, hoveredGoal: -1 };\n    this.GOALS = [\n      { num:'01', title:'Graduarme de la prepa y entrar al Tec de Monterrey', status:'En curso',  why:'Mi siguiente gran paso: Ingeniería en Transformación Digital.' },\n      { num:'02', title:'Convertir cualquier idea en un producto real',       status:'En curso',  why:'Del concepto al producto sin depender de nadie.' },\n      { num:'03', title:'Dominar web, apps y software de punta a punta',       status:'Pendiente', why:'Front-end, back-end y diseño en un mismo flujo.' },\n      { num:'04', title:'Aportar a la plataforma proptech familiar',          status:'Pendiente', why:'Sumar valor real a KlockK · Terra58.' },\n      { num:'05', title:'Empezar a monetizar mis propias habilidades',        status:'Pendiente', why:'Convertir el craft en ingresos propios.' }\n    ];\n    this.EVENTS = [\n      { x:55,  y:255, chip:'2010',      label:'2010 · Primer toque',                 title:'Primer toque',                          desc:'Empiezo a jugar fútbol desde kinder. El inicio de años de torneos y entrenamientos.' },\n      { x:129, y:210, chip:'2019',      label:'2019 · Selección Yucatán',            title:'Selección Yucatán',                      desc:'Convocado al Nacional en CDMX. Una actuación destacada llamó la atención de un visor del América, que quiso firmarme; mis papás dijeron que no por mi edad.' },\n      { x:203, y:225, chip:'2020–21',   label:'2020–2021 · Pandemia y Necaxa',       title:'Pandemia y Necaxa',                      desc:'Con las academias cerradas, me uno al equipo de Necaxa. Luego regreso al América.' },\n      { x:278, y:185, chip:'2021',      label:'2021 · Lázaro Cárdenas',              title:'Selección Yucatán · Lázaro Cárdenas',    desc:'Segundo torneo nacional representando a Yucatán. Llegamos a la final y perdimos. Una de las experiencias más formativas en el fútbol.' },\n      { x:352, y:190, chip:'2022',      label:'2022 · CUM',                          title:'CUM · Capitán',                          desc:'Entro al CUM representando a mi colegio. En mi primer año me nombran capitán del equipo.' },\n      { x:426, y:160, chip:'2023',      label:'2023 · Pádel',                        title:'Pádel',                                  desc:'Me inicio en el pádel y desarrollo un talento completamente nuevo. Primer torneo estatal: eliminados en octavos, pero gran experiencia.' },\n      { x:500, y:200, chip:'jun 2023',  label:'Jun 2023 · Lesión',                   title:'Fractura de clavícula',                  desc:'Me rompo la clavícula a dos milímetros de salirse. Tres meses sin escuela, más de un mes durmiendo sentado. Cinco meses de rehabilitación y regreso más fuerte.' },\n      { x:574, y:150, chip:'2024',      label:'2024 · Muay Thai',                    title:'Muay Thai',                              desc:'Me meto al Muay Thai, entreno duro, hago sparring los jueves y tengo mi primera pelea.' },\n      { x:648, y:130, chip:'2024 ·',    label:'2024 · Liga Marista',                 title:'Subcampeones Liga Marista',              desc:'Temporada fuerte con el equipo. Terminamos como subcampeones de liga.' },\n      { x:723, y:95,  chip:'ver. 2024', label:'Verano 2024 · TASIS, Londres',        title:'TASIS, Londres',                         desc:'Me voy a internado en Inglaterra. Aprendo inglés, gano independencia, viajo solo, hago networking internacional y conozco a quien hoy es mi novia. Gané MVP de tenis y MVP de fútbol de la temporada.' },\n      { x:797, y:80,  chip:'2024–26',   label:'2024–2026 · Dos años fuera',          title:'Dos años en TASIS',                      desc:'Vivir fuera de casa me enseña a cocinar, organizarme, manejar dinero y relacionarme con gente de todo el mundo. Relaciones que no tienen comparación.' },\n      { x:871, y:70,  chip:'2026',      label:'2026 · De vuelta',                    title:'De vuelta en Mérida',                    desc:'Terminando la prepa y tomando el curso de desarrollo web y diseño digital. Construyendo las skills para convertir ideas en productos reales.' },\n      { x:945, y:48,  chip:'próximo →', label:'Próximo →',                           title:'Tec de Monterrey',                       desc:'Ing. en Transformación Digital.' }\n    ];\n  }\n\n  select(i){ this.setState({ active: i }); }\n  setGoal(i){ this.setState({ hoveredGoal: i }); }\n\n  animateBubble(){\n    const el = this.bubbleRef.current; if(!el) return;\n    el.style.animation = 'none';\n    void el.offsetWidth;\n    el.style.animation = 'bubbleIn .42s cubic-bezier(.22,.61,.36,1) both';\n  }\n\n  componentDidUpdate(prevProps, prevState){\n    if(prevState && prevState.active !== this.state.active) this.animateBubble();\n  }\n\n  renderVals(){\n    const a = this.state.active;\n    const events = this.EVENTS.map((e, i) => ({\n      x: e.x, y: e.y, chip: e.chip,\n      onClick: () => this.select(i),\n      nodeR: i === a ? 7 : 5,\n      nodeFill: i === a ? '#3a5688' : '#fdfdfc',\n      nodeStroke: i === a ? '#c7d0e0' : '#9a9790',\n      nodeStrokeW: i === a ? 3 : 2,\n      chipBg: i === a ? '#1c1c1a' : '#fdfdfc',\n      chipColor: i === a ? '#f6f5f3' : '#8f8c84',\n      chipBorder: i === a ? '#1c1c1a' : 'rgba(28,28,26,.12)'\n    }));\n    const act = this.EVENTS[a] || this.EVENTS[0];\n    const hg = this.state.hoveredGoal;\n    const goals = this.GOALS.map((g, i) => {\n      const on = i === hg;\n      const live = g.status === 'En curso';\n      return {\n        num: g.num, title: g.title, why: g.why, status: g.status,\n        onEnter: () => this.setGoal(i),\n        onLeave: () => this.setGoal(-1),\n        rowBg: on ? '#faf9f7' : 'transparent',\n        numColor: on ? '#3a5688' : '#a09d95',\n        whyRows: on ? '1fr' : '0fr',\n        whyOpacity: on ? 1 : 0,\n        chipBg: live ? 'rgba(58,86,136,.10)' : '#f3f2ef',\n        chipColor: live ? '#3a5688' : '#a09d95',\n        chipBorder: live ? 'rgba(58,86,136,.28)' : 'rgba(28,28,26,.12)'\n      };\n    });\n    return {\n      goals,\n      rootRef: this.rootRef, nameRef: this.nameRef, statsRef: this.statsRef,\n      timelineRef: this.timelineRef, lineRef: this.lineRef, nodesRef: this.nodesRef,\n      geoRef: this.geoRef, geoStatusRef: this.geoStatusRef,\n      events, bubbleRef: this.bubbleRef,\n      bubbleYear: act.label, bubbleTitle: act.title, bubbleDesc: act.desc\n    };\n  }\n\n  componentDidMount(){\n    this.prepIntro();\n    requestAnimationFrame(() => this.runIntro());\n    this.initObservers();\n  }\n\n  prepIntro(){\n    const root = this.rootRef.current; if(!root) return;\n    this._reduced = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);\n    if(this._reduced) return;\n    this._reveals = [...root.querySelectorAll('[data-reveal]')];\n    this._reveals.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(18px)'; });\n    this._letters = [];\n    const host = this.nameRef.current;\n    if(host){\n      [...host.querySelectorAll('[data-word]')].forEach(w => {\n        const text = w.getAttribute('data-text') || w.textContent;\n        w.textContent = '';\n        [...text].forEach(ch => {\n          const s = document.createElement('span');\n          s.textContent = ch === ' ' ? '\\u00A0' : ch;\n          s.style.cssText = 'display:inline-block;opacity:0;transform:translateY(48px) scale(.7);will-change:transform,opacity;';\n          w.appendChild(s);\n          this._letters.push(s);\n        });\n      });\n    }\n  }\n\n  runIntro(){\n    if(this._reduced){ this.animateGeo(); return; }\n    const letters = this._letters || [];\n    letters.forEach((s, i) => {\n      setTimeout(() => {\n        s.style.transition = 'transform .62s cubic-bezier(.2,1.4,.35,1), opacity .5s ease';\n        s.style.transform = 'translateY(0) scale(1)';\n        s.style.opacity = '1';\n      }, 150 + i * 52);\n    });\n    const after = 220 + letters.length * 52 + 480;\n    setTimeout(() => {\n      (this._reveals || []).forEach((el, i) => {\n        setTimeout(() => {\n          el.style.transition = 'transform .7s cubic-bezier(.2,.7,.2,1), opacity .7s ease';\n          el.style.transform = 'translateY(0)';\n          el.style.opacity = '1';\n        }, i * 90);\n      });\n    }, after);\n    setTimeout(() => this.animateGeo(), after + 650);\n  }\n\n  animateGeo(){\n    const host = this.geoRef.current; if(!host || this._geoDone) return;\n    this._geoDone = true;\n    const items = [...host.querySelectorAll('[data-geo]')].map(el => ({\n      el,\n      target: parseFloat(el.getAttribute('data-target')),\n      dec: parseInt(el.getAttribute('data-dec') ?? '4', 10),\n      suffix: el.getAttribute('data-suffix') || ''\n    }));\n    const status = this.geoStatusRef.current;\n    if(this._reduced){\n      items.forEach(it => { it.el.textContent = it.target.toFixed(it.dec) + it.suffix; });\n      return;\n    }\n    const dur = 1600;\n    const start = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - p, 4);\n      items.forEach(it => {\n        let val = it.target * eased;\n        if(p < 1 && it.dec > 0) val += (Math.random() - .5) * (1 - eased) * 0.6;\n        if(val < 0) val = 0;\n        it.el.textContent = val.toFixed(it.dec) + it.suffix;\n      });\n      if(p < 1){ requestAnimationFrame(step); }\n      else {\n        items.forEach(it => { it.el.textContent = it.target.toFixed(it.dec) + it.suffix; });\n        if(status){ status.textContent = 'fijado ✓'; status.style.color = '#3a5688'; }\n      }\n    };\n    requestAnimationFrame(step);\n  }\n\n  onceVisible(el, fn){\n    if(!el) return;\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(en => { if(en.isIntersecting){ fn(); io.disconnect(); } });\n    }, { threshold: 0.25 });\n    io.observe(el);\n  }\n\n  initObservers(){\n    this.onceVisible(this.statsRef.current, () => this.animateStats());\n    this.onceVisible(this.timelineRef.current, () => this.animateGraph());\n  }\n\n  animateStats(){\n    const host = this.statsRef.current; if(!host) return;\n    host.querySelectorAll('[data-count]').forEach(el => {\n      const target = parseFloat(el.getAttribute('data-count'));\n      const pad = parseInt(el.getAttribute('data-pad') || '0', 10);\n      if(this._reduced){ el.textContent = pad ? String(target).padStart(pad,'0') : String(target); return; }\n      const dur = 1000;\n      const start = performance.now();\n      const step = (now) => {\n        const p = Math.min(1, (now - start)/dur);\n        const eased = 1 - Math.pow(1 - p, 3);\n        const val = Math.round(target * eased);\n        el.textContent = pad ? String(val).padStart(pad,'0') : String(val);\n        if(p < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    });\n  }\n\n  animateGraph(){\n    if(this._reduced) return;\n    const line = this.lineRef.current;\n    if(line){\n      const len = line.getTotalLength();\n      line.style.strokeDasharray = len;\n      line.style.strokeDashoffset = len;\n      line.getBoundingClientRect();\n      line.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(.4,.1,.2,1)';\n      line.style.strokeDashoffset = '0';\n    }\n    const nodes = this.nodesRef.current ? [...this.nodesRef.current.querySelectorAll('[data-node]')] : [];\n    nodes.forEach((n, i) => {\n      n.style.transformBox = 'fill-box';\n      n.style.transformOrigin = 'center';\n      n.style.transform = 'scale(0)';\n      n.style.opacity = '0';\n      setTimeout(() => {\n        n.style.transition = 'transform .5s cubic-bezier(.2,1.4,.4,1), opacity .4s ease';\n        n.style.transform = 'scale(1)';\n        n.style.opacity = '1';\n      }, 450 + i * 300);\n    });\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Portfolio de mi Persona.dc"}
  </script>
