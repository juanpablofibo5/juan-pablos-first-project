name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy oficial de Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela uno en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      # --ignore-scripts: pnpm v11 bloquea build scripts (esbuild) y falla en CI.
      # Los binarios nativos (esbuild, @tailwindcss/oxide) vienen como paquetes de
      # plataforma, así que no hace falta correr scripts para que `vite build` funcione.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      # Fallback SPA: GitHub Pages sirve 404.html para rutas profundas (/klokk, /yo…)
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
